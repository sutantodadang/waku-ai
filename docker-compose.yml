version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: waku
      POSTGRES_PASSWORD: waku
      POSTGRES_DB: waku
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U waku -d waku"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://waku:waku@db:5432/waku
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_started

  ai-service:
    build: ./ai
    env_file: .env
    ports:
      - "8001:8001"

  dashboard:
    build:
      context: ./dashboard
      args:
        # Public URL of the backend, baked into the SPA at build time.
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "8501:8501"
    depends_on:
      - backend

volumes:
  pgdata:
