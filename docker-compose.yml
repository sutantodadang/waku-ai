version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - ai-service
    volumes:
      - ./data:/app/data

  ai-service:
    build: ./ai
    env_file: .env
    ports:
      - "8001:8001"

  dashboard:
    build:
      context: ./dashboard
      args:
        # Public URL of the backend, baked into the SPA at build time.
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "8501:8501"
    depends_on:
      - backend

volumes:
  data:
