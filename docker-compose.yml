version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - ai-service
    volumes:
      - ./data:/app/data

  ai-service:
    build: ./ai
    env_file: .env
    ports:
      - "8001:8001"

  dashboard:
    build: ./dashboard
    ports:
      - "8501:8501"
    env_file: .env
    depends_on:
      - backend

volumes:
  data:
