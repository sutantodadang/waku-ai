# Waku Dashboard — Streamlit Theme
# Font: Plus Jakarta Sans — warm, geometric, friendly; fits Indonesian UMKM product.
# Not Inter/Roboto/Arial/system-ui.

[theme]
base = "light"
primaryColor = "#FF6D00"
backgroundColor = "#F5F5F5"
secondaryBackgroundColor = "#FFFFFF"
font = "sans serif"

[server]
headless = true

[client]
showErrorDetails = false
toolbarMode = "minimal"